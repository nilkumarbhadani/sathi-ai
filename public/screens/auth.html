<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Authentication — Sathi AI</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: var(--bg);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 32px 24px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-header .logo-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .auth-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--fg-muted);
            font-size: 14px;
            margin: 0;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--fg);
        }

        .form-group input {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--fg);
            font-family: var(--font-body);
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 130, 13, 0.15);
        }
        
        .form-group input:invalid:focus {
             border-color: #ef4444;
             box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .submit-btn {
            width: 100%;
            margin-top: 8px;
        }

        .toggle-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--fg-muted);
        }

        .toggle-text a {
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }
        
        /* Error message style */
        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: -8px;
            display: none;
        }

        /* Hide elements dynamically */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <button class="dark-mode-toggle" onclick="SathiDarkMode.toggle()" aria-label="Toggle dark mode" style="position:fixed; top:16px; right:16px; z-index:100;"><span class="dark-mode-icon">🌙</span></button>

    <div class="card auth-container">
        <div class="auth-header">
            <div class="logo-icon">🎓</div>
            <h1 id="authTitle">Welcome Back</h1>
            <p id="authSubtitle">Login to continue your learning journey.</p>
        </div>

        <form id="authForm" class="auth-form" novalidate>
            <div class="form-group hidden" id="nameGroup">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Rahul Sharma">
                <div class="error-message" id="nameError">Please enter your name</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="rahul@example.com" required>
                <div class="error-message" id="emailError">Please enter a valid email address</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required>
                <div class="error-message" id="passwordError">Password must be at least 8 characters long</div>
            </div>

            <button type="submit" class="btn-primary submit-btn" id="submitBtn">Login</button>
        </form>

        <div class="toggle-text">
            <span id="toggleQuestion">Don't have an account?</span> 
            <a id="toggleLink" onclick="toggleAuthMode()">Sign Up</a>
        </div>
    </div>

    <!-- Include Global Auth Logic -->
    <script src="../js/auth.js"></script>
    <script>
        // Check if user is already logged in, redirect them away if they are
        if (SathiAuth.isLoggedIn()) {
            SathiAuth.redirectToHome();
        }

        let isLoginMode = true;

        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const nameGroup = document.getElementById('nameGroup');
        const nameInput = document.getElementById('name');
        const submitBtn = document.getElementById('submitBtn');
        const toggleQuestion = document.getElementById('toggleQuestion');
        const toggleLink = document.getElementById('toggleLink');
        const authForm = document.getElementById('authForm');
        
        // Error fields
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            
            // Clear errors
            nameError.style.display = 'none';
            emailError.style.display = 'none';
            passwordError.style.display = 'none';

            if (isLoginMode) {
                authTitle.textContent = 'Welcome Back';
                authSubtitle.textContent = 'Login to continue your learning journey.';
                nameGroup.classList.add('hidden');
                nameInput.removeAttribute('required');
                submitBtn.textContent = 'Login';
                toggleQuestion.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign Up';
            } else {
                authTitle.textContent = 'Create Account';
                authSubtitle.textContent = 'Join Sathi AI and start learning today.';
                nameGroup.classList.remove('hidden');
                nameInput.setAttribute('required', 'true');
                submitBtn.textContent = 'Sign Up';
                toggleQuestion.textContent = 'Already have an account?';
                toggleLink.textContent = 'Login';
            }
        }
        
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            let isValid = true;
            
            // Reset errors
            nameError.style.display = 'none';
            emailError.style.display = 'none';
            passwordError.style.display = 'none';

            // Validate Name (if signup)
            if (!isLoginMode) {
                if (nameInput.value.trim() === '') {
                    nameError.style.display = 'block';
                    isValid = false;
                }
            }

            // Validate Email
            if (!validateEmail(emailInput.value)) {
                emailError.style.display = 'block';
                isValid = false;
            }

            // Validate Password
            if (passwordInput.value.length < 8) {
                passwordError.style.display = 'block';
                isValid = false;
            }

            if (isValid) {
                if (isLoginMode) {
                    SathiAuth.login(emailInput.value, passwordInput.value);
                } else {
                    SathiAuth.signup(nameInput.value, emailInput.value, passwordInput.value);
                }
            }
        });
    </script>
    <script src="../js/dark-mode.js"></script>
</body>
</html>
