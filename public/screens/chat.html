<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Chat with Sathi AI — your Universal AI Tutor for any subject.">
    <title>Chat with Sathi — Your AI Tutor</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js"></script>
    <script>
        SathiAuth.requireAuth();
    </script>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .chat-top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            min-height: 60px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
        }

        .chat-top-info { flex: 1; min-width: 0; }
        .chat-top-info strong {
            display: block;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status {
            font-size: 12px;
            color: #22C55E;
            font-weight: 600;
        }

        .chat-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 82%;
            padding: 13px 16px;
            border-radius: 20px;
            line-height: 1.55;
            font-size: 15px;
            animation: fadeIn 0.3s ease-out;
            word-break: break-word;
        }

        .message.sathi {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 5px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        /* ── Markdown styles inside AI messages ── */
        .message.sathi h1, .message.sathi h2, .message.sathi h3, .message.sathi h4 {
            margin: 12px 0 6px 0;
            font-size: inherit;
            line-height: 1.3;
        }
        .message.sathi h2 { font-size: 1.1em; }
        .message.sathi h3 { font-size: 1.05em; }
        .message.sathi p { margin: 4px 0; }
        .message.sathi ul, .message.sathi ol { margin: 6px 0; padding-left: 20px; }
        .message.sathi li { margin: 2px 0; }
        .message.sathi pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.4;
            margin: 8px 0;
        }
        .message.sathi code {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
        }
        .message.sathi :not(pre) > code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .message.sathi blockquote {
            border-left: 3px solid var(--accent);
            margin: 8px 0;
            padding: 6px 12px;
            background: var(--accent-light);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
        .message.sathi table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
            font-size: 13px;
        }
        .message.sathi th, .message.sathi td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
        }
        .message.sathi th {
            background: var(--bg);
            font-weight: 700;
        }
        .message.sathi hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }
        .message.sathi strong { color: var(--accent); }
        .message.sathi a { color: var(--accent); text-decoration: underline; }

        /* ── Interactive Quiz Card ── */
        .quiz-action-card {
            background: var(--soft-orange);
            border: 2px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-top: 8px;
        }
        .quiz-action-card p {
            margin: 0 0 12px 0;
            font-weight: 600;
        }
        .quiz-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s, background 0.18s;
            text-decoration: none;
        }
        .quiz-action-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }

        .typing-indicator {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .input-area {
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-wrapper { flex: 1; position: relative; }

        .chat-input {
            width: 100%;
            padding: 13px 18px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.18s;
            max-height: 120px;
            min-height: 48px;
            overflow-y: auto;
            line-height: 1.4;
            display: block;
            -webkit-appearance: none;
            box-sizing: border-box;
        }

        .chat-input:focus { border-color: var(--accent); }

        .send-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.15s, background 0.15s;
            touch-action: manipulation;
        }

        .send-btn:hover { background: var(--accent-dark); transform: scale(1.08); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .action-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--fg-muted);
            padding: 8px;
            border-radius: 50%;
            transition: background 0.15s, color 0.15s;
        }
        .action-btn:hover { background: var(--surface); color: var(--accent); }
        .action-btn.recording { color: #ef4444; animation: pulse 1.5s infinite; }

        /* ── Key Takeaways Panel ── */
        .side-panel {
            width: 280px;
            flex-shrink: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .side-panel h3 { font-size: 15px; margin: 0; }
        .takeaway-item {
            padding: 10px 12px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            font-size: 13px;
            line-height: 1.5;
            border-left: 3px solid var(--accent);
            animation: fadeIn 0.3s ease-out;
        }
        .takeaway-placeholder {
            text-align: center;
            color: var(--fg-muted);
            font-size: 13px;
            padding: 20px 12px;
            line-height: 1.5;
        }
        .motivation-chip {
            background: var(--soft-orange);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            margin-top: auto;
        }

        @media (max-width: 900px) {
            .side-panel { display: none; }
        }

        .clear-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--fg-muted);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
            font-family: var(--font-body);
            font-weight: 600;
        }
        .clear-btn:hover { background: var(--soft-red); color: #B91C1C; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>

    <div class="chat-top-bar">
        <a href="../index.html" class="back-btn" style="margin-right:4px;" aria-label="Back to Hub">&#8592;</a>
        <div class="avatar">S</div>
        <div class="chat-top-info">
            <strong>Sathi AI</strong>
            <div class="status">&#9679; Online &amp; Ready</div>
        </div>
        <button class="clear-btn" onclick="clearChat()" title="Clear conversation">🗑️ Clear</button>
        <button class="dark-mode-toggle" onclick="SathiDarkMode.toggle()" aria-label="Toggle dark mode" style="margin-left:4px;"><span class="dark-mode-icon">🌙</span></button>

    <div class="chat-layout">
        <main class="main-chat">

            <div class="input-area">
                <input type="file" id="mediaUpload" accept="image/*,application/pdf" style="display:none" onchange="handleMediaUpload(event)">

        <aside class="side-panel" id="sidePanel">

                    💡 Start a conversation and key takeaways will appear here automatically!
                </div>

                💪 Tu bohot mehnat kar raha hai, result zaroor milega! Keep it up. 🔥
            </div>
        </aside>
    </div>

<script>
/* ═══════════════════════════════════════════════════════════════
   MODULAR MARKDOWN RENDERER
   Lightweight renderer supporting: headings, bold/italic, code blocks,
   inline code, tables, ordered/unordered lists, blockquotes,
   horizontal rules, and links.
   Can be replaced with a library (e.g. marked.js) without touching
   any other code — just swap this function.
   ═══════════════════════════════════════════════════════════════ */
function renderMarkdown(text) {
    if (!text || typeof text !== 'string') return '';

    // Step 1: Extract and protect code blocks from further processing
    var codeBlocks = [];
    var html = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
        var idx = codeBlocks.length;
        var escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        var label = lang ? '<div style="font-size:11px;font-weight:700;color:var(--fg-muted);margin-bottom:4px;text-transform:uppercase;">' + lang + '</div>' : '';
        codeBlocks.push('<pre>' + label + '<code>' + escaped + '</code></pre>');
        return '%%CODEBLOCK_' + idx + '%%';
    });

    // Step 2: Escape HTML in remaining text
    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Step 3: Inline code (must come before other inline formatting)
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Step 4: Tables — detect header row, separator, body rows
    html = html.replace(/(?:^|\n)(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)+)/g, function(m, header, sep, body) {
        var t = '<table><thead><tr>';
        header.split('|').filter(function(c){return c.trim();}).forEach(function(cell){
            t += '<th>' + cell.trim() + '</th>';
        });
        t += '</tr></thead><tbody>';
        body.trim().split('\n').forEach(function(row){
            t += '<tr>';
            row.split('|').filter(function(c){return c.trim();}).forEach(function(cell){
                t += '<td>' + cell.trim() + '</td>';
            });
            t += '</tr>';
        });
        t += '</tbody></table>';
        return t;
    });

    // Step 5: Headings
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Step 6: Horizontal rules
    html = html.replace(/^(?:---|\*\*\*|___)$/gm, '<hr>');

    // Step 7: Bold + italic combinations
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/(?<!\w)\*(.+?)\*(?!\w)/g, '<em>$1</em>');

    // Step 8: Blockquotes (multi-line support)
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    // Merge consecutive blockquotes
    html = html.replace(/<\/blockquote>\n?<blockquote>/g, '<br>');

    // Step 9: Unordered lists (-, *, + markers)
    html = html.replace(/^(?:[-*+]) (.+)$/gm, '<li>$1</li>');

    // Step 10: Ordered lists (1., 2., etc.)
    html = html.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');

    // Wrap consecutive <li> in <ul> and <oli> in <ol>
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    html = html.replace(/((?:<oli>.*<\/oli>\n?)+)/g, function(m) {
        return '<ol>' + m.replace(/<\/?oli>/g, function(tag) {
            return tag.replace('oli', 'li');
        }) + '</ol>';
    });

    // Step 11: Links [text](url)
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Step 12: Line breaks (preserve newlines as <br>)
    html = html.replace(/\n/g, '<br>');

    // Step 13: Clean up extra <br> around block elements
    html = html.replace(/<\/(h[1-4]|blockquote|pre|ul|ol|table|hr)><br>/g, '</$1>');
    html = html.replace(/<br><(h[1-4]|blockquote|pre|ul|ol|table|hr)/g, '<$1');
    html = html.replace(/<br><\/(ul|ol)>/g, '</$1>');

    // Step 14: Restore code blocks
    codeBlocks.forEach(function(block, idx) {
        html = html.replace('%%CODEBLOCK_' + idx + '%%', block);
    });

    return html;
}

/* ═══════════════════════════════════════════════════════════════
   SAFE LOCALSTORAGE HELPER
   ═══════════════════════════════════════════════════════════════ */
function safeGetJSON(key, fallback) {
    try {
        var data = localStorage.getItem(key);
        if (!data) return fallback;
        return JSON.parse(data);
    } catch (e) {
        console.warn('localStorage corrupted for key:', key, '— resetting');
        try { localStorage.removeItem(key); } catch(e2) {}
        return fallback;
    }
}

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
var chatHistory = [];
var messageCount = 0;
var isSending = false;
var currentAbortController = null;
var isRecording = false;
var recognition = null;

var WELCOME_MESSAGE = '👋 Hi! I\'m Sathi AI.\n\nI can help with **any subject**, exam, coding, mathematics, science, humanities, AI, interview preparation, competitive exams, career guidance, writing, reasoning, or general knowledge.\n\n**Ask me anything** to get started! 🚀';

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', function() {
    loadChatHistory();
});

var inputEl = document.getElementById('userInput');
inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

/* ═══════════════════════════════════════════════════════════════
   VOICE RECOGNITION
   ═══════════════════════════════════════════════════════════════ */
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'hi-IN';
    recognition.onresult = function(event) {
        var text = event.results[0][0].transcript;
        document.getElementById('userInput').value = text;
        sendMessage();
    };
    recognition.onerror = function() { stopVoice(); };
    recognition.onend = function() { stopVoice(); };
}

function toggleVoice() {
    if (!recognition) { alert("Speech recognition is not supported in this browser. Try Chrome."); return; }
    if (isRecording) { recognition.stop(); stopVoice(); }
    else { recognition.start(); isRecording = true; document.getElementById('micBtn').classList.add('recording'); }
}
function stopVoice() { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); }

function speakText(text) {
    if ('speechSynthesis' in window) {
        var utterance = new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g, '').replace(/\*\*/g, '').substring(0, 500));
        utterance.lang = 'hi-IN';
        window.speechSynthesis.speak(utterance);
    }
}

/* ═══════════════════════════════════════════════════════════════
   TYPING INDICATOR
   ═══════════════════════════════════════════════════════════════ */
function showTyping() {
    var chat = document.getElementById('chatWindow');
    var el = document.createElement('div');
    el.className = 'typing-indicator'; el.id = 'typingIndicator';
    for (var i = 0; i < 3; i++) { var d = document.createElement('span'); d.className = 'typing-dot'; el.appendChild(d); }
    chat.appendChild(el);
    scrollToBottom();
}
function hideTyping() {
    var el = document.getElementById('typingIndicator');
    if (el) el.parentNode.removeChild(el);
}

/* ═══════════════════════════════════════════════════════════════
   LOCALSTORAGE PERSISTENCE (capped at 100 messages)
   ═══════════════════════════════════════════════════════════════ */
function saveMessageToLocalStorage(text, isUser, isHtml, rawText) {
    var savedHistory = safeGetJSON('sathi_chat_history', []);
    savedHistory.push({ text: text, isUser: isUser, isHtml: isHtml, rawText: rawText });
    // Cap at 100 messages — discard oldest
    if (savedHistory.length > 100) {
        savedHistory = savedHistory.slice(-100);
    }
    try {
        localStorage.setItem('sathi_chat_history', JSON.stringify(savedHistory));
    } catch (e) {
        // Storage full — clear old data and retry
        console.warn('localStorage full, clearing chat history');
        try {
            localStorage.removeItem('sathi_chat_history');
            localStorage.setItem('sathi_chat_history', JSON.stringify(savedHistory.slice(-20)));
        } catch (e2) {}
    }
}

function loadChatHistory() {
    var savedHistory = safeGetJSON('sathi_chat_history', []);
    var chatWindow = document.getElementById('chatWindow');

    if (savedHistory.length > 0) {
        chatWindow.innerHTML = '';

        var notice = document.createElement('div');
        notice.style.cssText = 'text-align:center;font-size:12px;color:var(--fg-muted);opacity:0.8;margin:12px 0;font-family:var(--font-body);font-weight:600;padding:6px 12px;background:var(--accent-light);border-radius:var(--radius-sm);border:1px solid var(--border);display:inline-block;align-self:center;';
        notice.textContent = '✨ Previous conversation restored';
        var nc = document.createElement('div');
        nc.style.cssText = 'display:flex;justify-content:center;width:100%;margin-bottom:12px;';
        nc.appendChild(notice);
        chatWindow.appendChild(nc);

        savedHistory.forEach(function(msg) {
            appendMessage(msg.text, msg.isUser, msg.isHtml, false);
            var safeText = msg.rawText || msg.text;
            if (typeof safeText !== 'string') safeText = '[Previous content]';
            chatHistory.push({ role: msg.isUser ? 'user' : 'model', text: safeText });
            messageCount++;
        });
        scrollToBottom();
    } else {
        appendMessage(renderMarkdown(WELCOME_MESSAGE), false, true, false);
    }
}

/* ═══════════════════════════════════════════════════════════════
   APPEND MESSAGE
   ═══════════════════════════════════════════════════════════════ */
function appendMessage(text, isUser, isHtml, shouldSave, rawText) {
    var chat = document.getElementById('chatWindow');
    var msg = document.createElement('div');
    msg.className = 'message anim-fade ' + (isUser ? 'user' : 'sathi');
    if (isHtml) { msg.innerHTML = text; } else { msg.textContent = text; }
    chat.appendChild(msg);
    scrollToBottom();
    if (shouldSave) {
        saveMessageToLocalStorage(text, isUser, isHtml, rawText || text);
    }
}

/* ═══════════════════════════════════════════════════════════════
   MEDIA UPLOAD
   ═══════════════════════════════════════════════════════════════ */
async function handleMediaUpload(event) {
    var file = event.target.files[0];
    if (!file) return;
    appendMessage('📎 Uploading ' + file.name + '...', true, false, true, '📎 Uploading ' + file.name);
    showTyping();
    document.getElementById('sendBtn').disabled = true;
    var formData = new FormData();
    formData.append('media', file);
    formData.append('prompt', 'Please explain the contents of this file clearly. Use markdown formatting.');
    try {
        var response = await fetch('/api/analyze-media', { method: 'POST', body: formData });
        var data = await response.json();
        hideTyping();
        if (data.error) throw new Error(data.error);
        appendMessage(renderMarkdown(data.response), false, true, true, data.response);
        messageCount++;
    } catch (err) {
        hideTyping();
        appendMessage('Sorry, media upload failed: ' + err.message, false, false, false);
    }
    document.getElementById('sendBtn').disabled = false;
    event.target.value = '';
}

/* ═══════════════════════════════════════════════════════════════
   SEND MESSAGE — with AbortController and duplicate guard
   ═══════════════════════════════════════════════════════════════ */
async function sendMessage() {
    if (isSending) return; // Prevent duplicate calls

    var input = document.getElementById('userInput');
    var text = input.value.trim();
    if (!text) return;

    isSending = true;
    appendMessage(text, true, false, true, text);
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    input.disabled = true;
    showTyping();

    // Cancel any stale pending request
    if (currentAbortController) {
        try { currentAbortController.abort(); } catch(e) {}
    }
    currentAbortController = new AbortController();

    try {
        var response = await fetch('/api/agent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: text,
                history: chatHistory,
                subjectsData: window.SathiStore ? window.SathiStore.getSubjects() : []
            }),
            signal: currentAbortController.signal
        });
        var data = await response.json();
        hideTyping();

        if (data.error) throw new Error(data.error);

        var responseText = (typeof data.response === 'string') ? data.response : JSON.stringify(data.response);

        chatHistory.push({ role: 'user', text: text });
        chatHistory.push({ role: 'model', text: responseText });
        messageCount += 2;

        var htmlText = renderMarkdown(responseText);
        appendMessage(htmlText, false, true, true, responseText);

        // Interactive Quiz Button — if QuizAgent handled the request
        if (data.handledBy === 'QuizAgent' && data.quizTopic) {
            var quizTopic = data.quizTopic;
            var card = document.createElement('div');
            card.className = 'quiz-action-card anim-fade';
            card.innerHTML = '<p>🎯 Ready to test your knowledge?</p>' +
                '<a class="quiz-action-btn" href="quiz.html?topic=' + encodeURIComponent(quizTopic) + '">Generate Quiz on "' + quizTopic.substring(0, 40) + '" 🚀</a>';
            document.getElementById('chatWindow').appendChild(card);
            scrollToBottom();
        }

        if (data.handledBy) {
            var chat = document.getElementById('chatWindow');
            var badge = document.createElement('span');
            badge.style.cssText = 'font-size:11px;color:gray;font-style:italic;align-self:flex-start;margin-top:-8px;padding-left:16px;';
            badge.textContent = '🤖 via ' + data.handledBy;
            chat.appendChild(badge);
            scrollToBottom();
        }

        speakText(responseText);

        // Generate dynamic takeaways after sufficient conversation
        if (messageCount >= 6) { generateTakeaways(); }

    } catch (err) {
        hideTyping();
        if (err.name === 'AbortError') {
            // Request was cancelled — do nothing
        } else {
            var errMsg = classifyFetchError(err);
            appendMessage(errMsg, false, false, false);
        }
    }

    isSending = false;
    currentAbortController = null;
    document.getElementById('sendBtn').disabled = false;
    input.disabled = false;
    input.focus();
}

/* ═══════════════════════════════════════════════════════════════
   ERROR CLASSIFICATION (frontend)
   ═══════════════════════════════════════════════════════════════ */
function classifyFetchError(err) {
    var msg = (err.message || '').toLowerCase();
    if (msg.includes('failed to fetch') || msg.includes('networkerror') || msg.includes('network')) {
        return '🌐 Internet connection issue hai. Apna connection check karo aur dobara try karo!';
    }
    if (msg.includes('timeout') || msg.includes('aborted')) {
        return '⏳ Request timeout ho gaya. Dobara try karo!';
    }
    if (msg.includes('rate') || msg.includes('429') || msg.includes('quota')) {
        return '😅 Thoda ruko! Rate limit hit ho gaya. 30 seconds baad try karo.';
    }
    if (msg.includes('500') || msg.includes('server')) {
        return '🛠️ Server busy hai. Thodi der baad try karo!';
    }
    return '😔 Kuch issue aa gaya: ' + err.message;
}

/* ═══════════════════════════════════════════════════════════════
   KEY TAKEAWAYS (dynamic, Gemini-generated)
   ═══════════════════════════════════════════════════════════════ */
var takeawaysTimeout = null;

async function generateTakeaways() {
    if (takeawaysTimeout) clearTimeout(takeawaysTimeout);
    takeawaysTimeout = setTimeout(async function() {
        try {
            var recentHistory = chatHistory.slice(-10);
            var summary = recentHistory.map(function(m) {
                return (m.role === 'user' ? 'Student: ' : 'Tutor: ') + (m.text || '').substring(0, 300);
            }).join('\n');

            var response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'Based on this conversation, generate 3-5 key takeaways as a JSON array of strings. Each takeaway should be concise (1-2 sentences). Return ONLY the JSON array, no markdown:\n\n' + summary,
                    history: []
                })
            });
            var data = await response.json();
            if (data.response) {
                try {
                    var raw = data.response.trim().replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                    var takeaways = JSON.parse(raw);
                    if (Array.isArray(takeaways) && takeaways.length > 0) {
                        renderTakeaways(takeaways);
                    }
                } catch (e) {
                    // Fallback: show raw text as single takeaway
                    renderTakeaways([data.response.substring(0, 200)]);
                }
            }
        } catch (err) {
            console.error('Takeaways generation failed:', err);
        }
    }, 2000);
}

function renderTakeaways(takeaways) {
    var container = document.getElementById('takeawaysContent');
    container.innerHTML = '';
    takeaways.forEach(function(t) {
        var div = document.createElement('div');
        div.className = 'takeaway-item';
        div.textContent = (typeof t === 'string') ? t : JSON.stringify(t);
        container.appendChild(div);
    });
}

/* ═══════════════════════════════════════════════════════════════
   CLEAR CHAT
   ═══════════════════════════════════════════════════════════════ */
function clearChat() {
    if (!confirm('Clear the entire conversation? This cannot be undone.')) return;
    chatHistory = [];
    messageCount = 0;
    try { localStorage.removeItem('sathi_chat_history'); } catch(e) {}
    document.getElementById('chatWindow').innerHTML = '';
    document.getElementById('takeawaysContent').innerHTML = '<div class="takeaway-placeholder">💡 Start a conversation and key takeaways will appear here automatically!</div>';
    appendMessage(renderMarkdown(WELCOME_MESSAGE), false, true, false);
}

function scrollToBottom() {
    var chat = document.getElementById('chatWindow');
    chat.scrollTop = chat.scrollHeight;
}
</script>
